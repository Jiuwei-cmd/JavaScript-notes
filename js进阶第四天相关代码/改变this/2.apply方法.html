<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      const obj = {
        age: 18,
      };
      function fn(x, y) {
        console.log(this);
        console.log(x + y);
      }
      fn.apply(obj, [2, 3]);

      // 使用场景：求数组最大值
      // 1. 遍历比较  2. 展开运算符  3. 利用 apply() 方法
      const arr = [100, 44, 77];
      const max = Math.max.apply(Math, arr);
      const min = Math.min.apply(Math, arr);
      console.log(max, min);
      // 使用场景：求数组最大值
      console.log(Math.max(...arr));
    </script>
  </body>
</html>
