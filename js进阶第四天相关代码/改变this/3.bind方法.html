<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <button>发送短信</button>
    <script>
      const obj = {
        age: 18,
      };
      function fn() {
        console.log(this);
      }

      // 1. bind 不会调用函数
      // 2. 能改变 this 指向
      // 3. 返回值是个函数， 但是这个函数里面的this是更改过的obj
      const fun = fn.bind(obj);
      fun();

      const btn = document.querySelector("button");
      btn.addEventListener("click", function () {
        this.disabled = true;
        setTimeout(
          function () {
            this.disabled = false;
          }.bind(btn),
          1000,
        );
      });
    </script>
  </body>
</html>
