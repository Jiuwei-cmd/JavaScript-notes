  <body>
    <script>
      const obj = {
        uname: "pink",
        age: 18,
      };
      const o = {};
      function deepCopy(newObj, oldObj) {
        for (let k in oldObj) {
          newObj[k] = oldObj[k];
        }
      }
      deepCopy(o, obj);
      o.age = 80;
      console.log(o);
    </script>
  </body>
