<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      const obj = {
        uname: "pink",
        age: 18,
        hobby: ["足球", "乒乓球"],
      };
      const o = {};
      function deepCopy(newObj, oldObj) {
        for (let k in oldObj) {
          if (oldObj[k] instanceof Array) {
            newObj[k] = [];
            deepCopy(newObj[k], oldObj[k]);
          } else if (oldObj[k] instanceof Object) {
            newObj[k] = {};
            deepCopy(newObj[k], oldObj[k]);
          } else {
            newObj[k] = oldObj[k];
          }
        }
      }
      deepCopy(o, obj);
      o.hobby[0] = "羽毛球";
      console.log(o);
      console.log(obj);
    </script>
  </body>
</html>
