<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <button>点击</button>
    <script>
      // 普通函数，谁调用我，我就指向谁
      console.log(this); // window
      function fn() {
        console.log(this); // window
      }
      fn();
      setTimeout(function () {
        console.log(this);
      }, 1000);
      document.querySelector("button").addEventListener("click", function () {
        console.log(this);
      });
      let obj = {
        sayHi: function () {
          console.log(this);
        },
      };
      obj.sayHi();
    </script>
  </body>
</html>
