<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      function Person() {
        this.eays = 2;
        this.head = 1;
      }
      // 女人 构造函数 继承
      function Women() {
        this.name = "red";
      }
      Women.prototype = new Person();
      Women.prototype.show = function () {
        console.log("show");
      };
      Women.prototype.constructor = Women;
      const red = new Women();
      console.log(Women);
      console.log(red);
      console.log(red.eays);
      console.log(red.name);

      // 男人 构造函数
      function Man() {}
      Man.prototype = new Person();
      Man.prototype.constructor = Man;
      const pink = new Man();
      console.log(pink);
    </script>
  </body>
</html>
